# SQLite Database Configuration
spring.datasource.url=jdbc:sqlite:src/main/resources/theatre-aggregator/theatre.db?journal_mode=WAL&busy_timeout=30000
spring.datasource.driver-class-name=org.sqlite.JDBC

# HikariCP settings for SQLite (limited connections with WAL mode)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=5000

# Hibernate configuration for SQLite
spring.jpa.database-platform=org.sqlite.hibernate.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server configuration
server.port=8080

# File upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging configuration
logging.level.com.krakow.theaters.service.TeatrWKrakowieParser=DEBUG
